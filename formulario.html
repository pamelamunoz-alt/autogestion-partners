<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de finalización | PedidosYa Partners</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --rosa: #FA0050;
      --celeste: #61C8FA;
      --blanco: #FFFFFF;
      --gris-fondo: #F7F7F7;
      --negro: #111217;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Poppins", sans-serif;
      background-color: var(--gris-fondo);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      min-height: 100vh;
    }

    h1 {
      color: var(--rosa);
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 10px;
      text-align: center;
    }

    p {
      color: var(--negro);
      text-align: center;
      margin-bottom: 25px;
      max-width: 600px;
    }

    form {
      background-color: var(--blanco);
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      padding: 30px 40px;
      width: 100%;
      max-width: 500px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--negro);
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 5px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-family: "Poppins", sans-serif;
    }

    .autocomplete-wrapper {
      position: relative;
      width: 100%;
    }

    #autocomplete-list {
      position: absolute;
      top: 48px;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      max-height: 180px;
      overflow-y: auto;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      z-index: 9999;
      display: none;
    }

    #autocomplete-list div {
      padding: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    #autocomplete-list div:hover {
      background: #ffe3ef;
    }

    button {
      background-color: var(--rosa);
      color: var(--blanco);
      font-weight: 600;
      border: none;
      border-radius: 10px;
      padding: 14px 36px;
      cursor: pointer;
      transition: 0.3s;
      width: 100%;
      font-size: 1rem;
      margin-top: 20px;
    }

    button:hover {
      background-color: #ff3377;
      transform: scale(1.03);
    }

    #mensaje {
      margin-top: 20px;
      font-weight: 600;
      text-align: center;
      white-space: pre-line;
    }
  </style>
</head>

<body>

  <h1>¡Curso completado!</h1>
  <p>Por favor, completa los siguientes datos para registrar tu participación y tu local se estará aperturando durante el día.</p>

  <form id="registroForm">
    
    <label>Nombre del local (Igual como figura en tu POS o Sistema de Recepcion)</label>
    <div class="autocomplete-wrapper">
      <input type="text" id="local" name="local" placeholder="Escribe el nombre del local..." required autocomplete="off">
      <div id="autocomplete-list"></div>
    </div>

    <label>Nombre del participante</label>
    <input type="text" id="nombre" name="nombre" required>

    <label>Número de teléfono</label>
    <input type="tel" id="telefono" name="telefono" required pattern="[0-9]{8}" maxlength="8">

    <button type="submit">Enviar registro</button>
    <div id="mensaje"></div>
  </form>

<script>
  const scriptURL = "https://script.google.com/macros/s/AKfycbxB9tK5dtPs0Powadbx1c5FQQS9eR8skfubwuyVEVk4hWxFOIt8pc_Zhldov2P14KjpxA/exec";

  const form = document.getElementById("registroForm");
  const mensaje = document.getElementById("mensaje");
  const localInput = document.getElementById("local");
  const list = document.getElementById("autocomplete-list");
  const telefonoInput = document.getElementById("telefono");

  let partners = [];

  telefonoInput.addEventListener("input", () => {
    telefonoInput.value = telefonoInput.value.replace(/\D/g, "").slice(0, 8);
  });

  async function cargarPartners() {
    try {
      const res = await fetch(`${scriptURL}?action=getPartners`);
      const text = await res.text();

      let data;
      try {
        data = JSON.parse(text);
      } catch (err) {
        console.error("La respuesta de getPartners no es JSON válido:", text);
        throw new Error("No se pudo cargar la lista de locales.");
      }

      partners = data.partners || [];
      console.log("Partners cargados:", partners.length);
    } catch (error) {
      console.error("Error cargando partners:", error);
      mensaje.textContent = "No se pudo cargar la lista de locales.";
      mensaje.style.color = "red";
    }
  }

  cargarPartners();

  localInput.addEventListener("input", () => {
    const val = localInput.value.toLowerCase().trim();
    list.innerHTML = "";

    if (val.length < 2) {
      list.style.display = "none";
      return;
    }

    const matches = partners
      .filter(p => p.toLowerCase().includes(val))
      .slice(0, 12);

    if (!matches.length) {
      list.style.display = "none";
      return;
    }

    matches.forEach(p => {
      const div = document.createElement("div");
      div.textContent = p;
      div.onclick = () => {
        localInput.value = p;
        list.style.display = "none";
      };
      list.appendChild(div);
    });

    list.style.display = "block";
  });

  document.addEventListener("click", e => {
    if (!e.target.closest(".autocomplete-wrapper")) {
      list.style.display = "none";
    }
  });

  form.addEventListener("submit", async e => {
    e.preventDefault();

    mensaje.textContent = "Enviando registro...";
    mensaje.style.color = "#FA0050";

    try {
      const formData = new FormData(form);

      const res = await fetch(scriptURL, {
        method: "POST",
        body: formData
      });

      const text = await res.text();
      console.log("Respuesta doPost:", text);

      if (text.trim() === "OK") {
        mensaje.textContent = "Registro enviado con éxito. ¡Gracias por completar el curso!";
        mensaje.style.color = "green";
        form.reset();
        list.style.display = "none";
      } else {
        mensaje.textContent = text;
        mensaje.style.color = "red";
      }

    } catch (error) {
      console.error("Error al enviar:", error);
      mensaje.textContent = "Ocurrió un error al enviar el registro.";
      mensaje.style.color = "red";
    }
  });
</script>

</body>
</html>
